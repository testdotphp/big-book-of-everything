##############################################################################
# Immich — Self-hosted photo management
# Deploy on Unraid (.110)
#
# Immich needs its own PostgreSQL with pgvecto.rs extension (for ML vectors)
# so it cannot share the existing authentik-db.
#
# Prerequisites:
#   - Create appdata dirs:
#       mkdir -p /mnt/appdata/immich/{upload,library,postgres,model-cache}
#   - Photo library accessible at /mnt/user/photos/
##############################################################################

networks:
  br0:
    external: true
    driver: macvlan
    driver_opts:
      parent: br0
  immich-internal:
    driver: bridge

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    networks:
      br0:
        ipv4_address: 192.168.150.136
      immich-internal:
    environment:
      DB_HOSTNAME: immich-postgres
      DB_PORT: "5432"
      DB_DATABASE_NAME: immich
      DB_USERNAME: immich
      DB_PASSWORD: immich
      REDIS_HOSTNAME: immich-redis
      TZ: "America/Chicago"
      IMMICH_MACHINE_LEARNING_URL: "http://immich-ml:3003"
      NODE_EXTRA_CA_CERTS: "/usr/local/share/ca-certificates/teedge-local-ca.crt"
    volumes:
      - /mnt/appdata/immich/upload:/usr/src/app/upload
      - /mnt/user/photos:/usr/src/app/upload/library
      - /mnt/appdata/certs/teedge-local-ca/ca.crt:/usr/local/share/ca-certificates/teedge-local-ca.crt:ro
    ports:
      - "2283:2283"
    depends_on:
      - immich-redis
      - immich-postgres

  immich-ml:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-ml
    restart: unless-stopped
    networks:
      immich-internal:
    environment:
      TZ: "America/Chicago"
    volumes:
      - /mnt/appdata/immich/model-cache:/cache

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    restart: unless-stopped
    networks:
      immich-internal:

  immich-postgres:
    image: tensorchord/pgvecto-rs:pg16-v0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    networks:
      immich-internal:
    environment:
      POSTGRES_DB: immich
      POSTGRES_USER: immich
      POSTGRES_PASSWORD: immich
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - /mnt/appdata/immich/postgres:/var/lib/postgresql/data
