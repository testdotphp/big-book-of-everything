##############################################################################
# Immich — Self-hosted photo management
# Deploy on Unraid (.110)
#
# Immich needs its own PostgreSQL with pgvecto.rs extension (for ML vectors)
# so it cannot share the existing authentik-db.
#
# Prerequisites:
#   - Create appdata dirs:
#       mkdir -p /mnt/appdata/containers/immich/{upload,library,postgres,model-cache}
#   - Photo library accessible at /mnt/user/MEDIA/Pictures/
##############################################################################

networks:
  br0:
    external: true
    driver: macvlan
    driver_opts:
      parent: br0
  immich-internal:
    driver: bridge

secrets:
  immich_db_password:
    file: /mnt/appdata/secrets/immich_db_password

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/immich-app/immich/main/docs/static/img/favicon.png"
      net.unraid.docker.webui: "https://immich.teedge.local"
    networks:
      br0:
        ipv4_address: 192.168.150.136
      immich-internal:
    environment:
      DB_HOSTNAME: immich-postgres
      DB_PORT: "5432"
      DB_DATABASE_NAME: immich
      DB_USERNAME: immich
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      REDIS_HOSTNAME: immich-redis
      TZ: "America/Chicago"
      IMMICH_MACHINE_LEARNING_URL: "http://immich-ml:3003"
      # OIDC config (Immich has native OIDC):
      # OAUTH_ENABLED: "true"
      # OAUTH_ISSUER_URL: "https://authentik.teedge.local/application/o/immich/.well-known/openid-configuration"
      # OAUTH_CLIENT_ID: <from Authentik>
      # OAUTH_CLIENT_SECRET: <from Authentik>
      # OAUTH_AUTO_REGISTER: "true"
      # OAUTH_BUTTON_TEXT: "Login with Authentik"
      # Trust self-signed CA
      NODE_EXTRA_CA_CERTS: "/usr/local/share/ca-certificates/teedge-local-ca.crt"
    volumes:
      - /mnt/appdata/containers/immich/upload:/usr/src/app/upload
      - /mnt/user/MEDIA/Pictures:/usr/src/app/upload/library
      - /mnt/appdata/certs/teedge-local-ca/ca.crt:/usr/local/share/ca-certificates/teedge-local-ca.crt:ro
    depends_on:
      - immich-redis
      - immich-postgres

    mem_limit: 4g
    cpus: 4.0
  immich-ml:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-ml
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/immich-app/immich/main/docs/static/img/favicon.png"
    networks:
      - immich-internal
    environment:
      TZ: "America/Chicago"
    volumes:
      - /mnt/appdata/containers/immich/model-cache:/cache

    mem_limit: 4g
    cpus: 4.0
  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/immich-app/immich/main/docs/static/img/favicon.png"
    networks:
      - immich-internal

    mem_limit: 512m
    cpus: 0.5
  immich-postgres:
    image: tensorchord/pgvecto-rs:pg16-v0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/immich-app/immich/main/docs/static/img/favicon.png"
    networks:
      - immich-internal
    environment:
      POSTGRES_DB: immich
      POSTGRES_USER: immich
      POSTGRES_PASSWORD_FILE: /run/secrets/immich_db_password
      POSTGRES_INITDB_ARGS: "--data-checksums"
    secrets:
      - immich_db_password
    volumes:
      - /mnt/appdata/containers/immich/postgres:/var/lib/postgresql/data
    mem_limit: 2g
    cpus: 2.0
