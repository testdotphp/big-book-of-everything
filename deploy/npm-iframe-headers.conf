# NPM Custom Nginx Configuration
# Apply to EVERY proxy host that will be embedded in a portal iframe.
# Paste this into the "Custom Nginx Configuration" box in NPM's proxy host editor.
#
# This strips X-Frame-Options and Content-Security-Policy from the backend response,
# then adds a permissive frame-ancestors directive allowing the 3 portal domains.

proxy_hide_header X-Frame-Options;
proxy_hide_header Content-Security-Policy;
add_header Content-Security-Policy "frame-ancestors https://home.teedge.local https://media.teedge.local https://lab.teedge.local" always;
