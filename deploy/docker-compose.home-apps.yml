##############################################################################
# Home Management Apps
# Deploy on Unraid (.110) with macvlan networking
#
# Prerequisites:
#   - Create databases in PostgreSQL 16 (authentik-db at .110:5433):
#       CREATE DATABASE homechart;
#       CREATE DATABASE paperless;
#       CREATE DATABASE vikunja;
#   - Create appdata dirs:
#       mkdir -p /mnt/appdata/containers/{homechart,mealie,actual,paperless/{data,media,export,consume}}
#       mkdir -p /mnt/appdata/containers/{homebox,grocy,vikunja,homehub}
#   - CA cert available at /mnt/appdata/certs/teedge-local-ca/ca.crt
##############################################################################

networks:
  br0:
    external: true
    driver: macvlan
    driver_opts:
      parent: br0

services:
  homechart:
    image: ghcr.io/candiddev/homechart:latest
    container_name: homechart
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://raw.githubusercontent.com/candiddev/homechart/main/hugo/static/homechart.png"
      net.unraid.docker.webui: "https://homechart.teedge.local"
    networks:
      br0:
        ipv4_address: 192.168.150.124
    environment:
      homechart_app_baseurl: "https://homechart.teedge.local"
      homechart_database_uri: "postgresql://authentik:${PG_PASSWORD}@192.168.150.110:5433/homechart"
      # OIDC config — set after Authentik provider is created:
      # HOMECHART_OIDC_CLIENTID: <from Authentik>
      # HOMECHART_OIDC_CLIENTSECRET: <from Authentik>
      # HOMECHART_OIDC_ISSUER: "https://authentik.teedge.local/application/o/homechart/"
      TZ: "America/Chicago"
    volumes:
      - /mnt/appdata/containers/homechart:/data
      - /mnt/appdata/certs/teedge-local-ca/ca.crt:/usr/local/share/ca-certificates/teedge-local-ca.crt:ro
    ports:
      - "8080:8080"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    cpus: 1.0
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://raw.githubusercontent.com/mealie-recipes/mealie/mealie-next/frontend/static/icons/favicon-512x512.png"
      net.unraid.docker.webui: "https://mealie.teedge.local"
    networks:
      br0:
        ipv4_address: 192.168.150.141
    environment:
      ALLOW_SIGNUP: "false"
      TZ: "America/Chicago"
      BASE_URL: "https://mealie.teedge.local"
      # OIDC — enable after Authentik provider is created:
      # OIDC_AUTH_ENABLED: "true"
      # OIDC_SIGNUP_ENABLED: "true"
      # OIDC_CONFIGURATION_URL: "https://authentik.teedge.local/application/o/mealie/.well-known/openid-configuration"
      # OIDC_AUTO_REDIRECT: "true"
      # OIDC_PROVIDER_NAME: "Authentik"
      # OIDC_CLIENT_ID: <from Authentik>
      NODE_EXTRA_CA_CERTS: "/usr/local/share/ca-certificates/teedge-local-ca.crt"
    volumes:
      - /mnt/appdata/containers/mealie:/app/data
      - /mnt/appdata/certs/teedge-local-ca/ca.crt:/usr/local/share/ca-certificates/teedge-local-ca.crt:ro
    ports:
      - "9000:9000"

    mem_limit: 1g
    cpus: 1.0
  actual-budget:
    image: ghcr.io/actualbudget/actual-server:latest
    container_name: actual-budget
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://raw.githubusercontent.com/actualbudget/actual/master/packages/desktop-client/public/favicon.ico"
      net.unraid.docker.webui: "https://actual.teedge.local"
    networks:
      br0:
        ipv4_address: 192.168.150.126
    environment:
      TZ: "America/Chicago"
      # ACTUAL_LOGIN_METHOD: "openid"  # Enable after Authentik provider is created
      # ACTUAL_OPENID_DISCOVERY_URL: "https://authentik.teedge.local/application/o/actual-budget/.well-known/openid-configuration"
      # ACTUAL_OPENID_CLIENT_ID: <from Authentik>
      # ACTUAL_OPENID_CLIENT_SECRET: <from Authentik>
      NODE_EXTRA_CA_CERTS: "/usr/local/share/ca-certificates/teedge-local-ca.crt"
    volumes:
      - /mnt/appdata/containers/actual:/data
      - /mnt/appdata/certs/teedge-local-ca/ca.crt:/usr/local/share/ca-certificates/teedge-local-ca.crt:ro
    ports:
      - "5006:5006"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5006/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: 0.5
  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ngx
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://raw.githubusercontent.com/paperless-ngx/paperless-ngx/main/src-ui/src/favicon.ico"
      net.unraid.docker.webui: "https://paperless.teedge.local"
    networks:
      br0:
        ipv4_address: 192.168.150.142
    environment:
      PAPERLESS_URL: "https://paperless.teedge.local"
      PAPERLESS_DBHOST: "192.168.150.110"
      PAPERLESS_DBPORT: "5433"
      PAPERLESS_DBNAME: "paperless"
      PAPERLESS_DBUSER: "authentik"
      PAPERLESS_DBPASS: "${PG_PASSWORD}"
      PAPERLESS_REDIS: "redis://:${REDIS_PASSWORD}@192.168.150.110:6379"
      PAPERLESS_TIME_ZONE: "America/Chicago"
      PAPERLESS_OCR_LANGUAGE: "eng"
      PAPERLESS_CONSUMER_POLLING: "30"
      # OIDC via django-allauth (Paperless v2.x+):
      # OIDC via django-allauth — enable after Authentik provider is created:
      # PAPERLESS_APPS: "allauth.socialaccount.providers.openid_connect"
      # PAPERLESS_SOCIALACCOUNT_PROVIDERS: '{"openid_connect":{"APPS":[{"provider_id":"authentik","name":"Authentik","client_id":"<from Authentik>","secret":"<from Authentik>","settings":{"server_url":"https://authentik.teedge.local/application/o/paperless/.well-known/openid-configuration"}}]}}'
      # PAPERLESS_DISABLE_REGULAR_LOGIN: "false"
      # PAPERLESS_REDIRECT_LOGIN_TO_SSO: "true"
      # Trust self-signed CA
      REQUESTS_CA_BUNDLE: "/usr/local/share/ca-certificates/teedge-local-ca.crt"
    volumes:
      - /mnt/appdata/containers/paperless/data:/usr/src/paperless/data
      - /mnt/appdata/containers/paperless/media:/usr/src/paperless/media
      - /mnt/appdata/containers/paperless/export:/usr/src/paperless/export
      - /mnt/appdata/containers/paperless/consume:/usr/src/paperless/consume
      - /mnt/appdata/certs/teedge-local-ca/ca.crt:/usr/local/share/ca-certificates/teedge-local-ca.crt:ro
    ports:
      - "8000:8000"

    mem_limit: 2g
    cpus: 2.0
  homebox:
    image: ghcr.io/sysadminsmedia/homebox:latest
    container_name: homebox
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://raw.githubusercontent.com/sysadminsmedia/homebox/main/frontend/static/favicon.svg"
      net.unraid.docker.webui: "https://homebox.teedge.local"
    networks:
      br0:
        ipv4_address: 192.168.150.134
    environment:
      TZ: "America/Chicago"
      HBOX_WEB_MAX_UPLOAD_SIZE: "50"
    volumes:
      - /mnt/appdata/containers/homebox:/data
    ports:
      - "7745:7745"

    mem_limit: 512m
    cpus: 0.5
  grocy:
    image: lscr.io/linuxserver/grocy:latest
    container_name: grocy
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/grocy-icon.png"
      net.unraid.docker.webui: "https://grocy.teedge.local"
    networks:
      br0:
        ipv4_address: 192.168.150.143
    environment:
      PUID: 99
      PGID: 100
      TZ: "America/Chicago"
    volumes:
      - /mnt/appdata/containers/grocy:/config
    ports:
      - "9283:80"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: 0.5
  vikunja:
    image: vikunja/vikunja:latest
    container_name: vikunja
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://kolaente.dev/vikunja/vikunja/raw/branch/main/frontend/public/images/icons/favicon-512x512.png"
      net.unraid.docker.webui: "https://vikunja.teedge.local"
    networks:
      br0:
        ipv4_address: 192.168.150.137
    environment:
      VIKUNJA_SERVICE_PUBLICURL: "https://vikunja.teedge.local"
      VIKUNJA_SERVICE_TIMEZONE: "America/Chicago"
      VIKUNJA_DATABASE_TYPE: "postgres"
      VIKUNJA_DATABASE_HOST: "192.168.150.110:5433"
      VIKUNJA_DATABASE_DATABASE: "vikunja"
      VIKUNJA_DATABASE_USER: "homeapps"
      VIKUNJA_DATABASE_PASSWORD: "${HOMEAPPS_PG_PASSWORD}"
      VIKUNJA_DATABASE_SSLMODE: "disable"
      # OIDC config:
      # VIKUNJA_AUTH_OPENID_ENABLED: "true"  # Enable after Authentik provider is created
      # VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_NAME: "Authentik"
      # VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_AUTHURL: "https://authentik.teedge.local/application/o/authorize/"
      # VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_CLIENTID: <from Authentik>
      # VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_CLIENTSECRET: <from Authentik>
    volumes:
      - /mnt/appdata/containers/vikunja:/app/vikunja/files
      - /mnt/appdata/certs/teedge-local-ca/ca.crt:/usr/local/share/ca-certificates/teedge-local-ca.crt:ro
    ports:
      - "3456:3456"

  # homehub:
  #   # TODO: Find correct Docker image — surajverma/homehub doesn't exist
  #   image: surajverma/homehub:latest
  #   container_name: homehub
  #   restart: unless-stopped
  #   networks:
  #     br0:
  #       ipv4_address: 192.168.150.138
  #   environment:
  #     TZ: "America/Chicago"
  #   volumes:
  #     - /mnt/appdata/containers/homehub:/app/data
  #   ports:
  #     - "3050:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3456/api/v1/info || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    cpus: 1.0
