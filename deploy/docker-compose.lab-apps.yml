##############################################################################
# Lab Apps — Dozzle, Loki, Promtail, n8n, IT-Tools
# Deploy on Unraid (.110)
#
# Prerequisites:
#   - Create appdata dirs: /mnt/appdata/containers/{loki,promtail,n8n}
#   - Docker socket proxy running at 192.168.150.110:2375
#   - Create 'n8n' database in PostgreSQL 16:
#       docker exec -it authentik-db psql -U authentik -c "CREATE DATABASE n8n;"
##############################################################################

networks:
  br0:
    external: true
    driver: macvlan
    driver_opts:
      parent: br0

services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://raw.githubusercontent.com/amir20/dozzle/master/assets/docker_fill.svg"
      net.unraid.docker.webui: "https://dozzle.teedge.local"
    environment:
      DOZZLE_REMOTE_HOST: "tcp://192.168.150.110:2375"
    ports:
      - "8090:8080"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: 0.5
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://raw.githubusercontent.com/grafana/loki/main/docs/sources/logo.png"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - /mnt/appdata/containers/loki:/loki
      - /mnt/appdata/containers/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 2g
    cpus: 2.0
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://raw.githubusercontent.com/grafana/loki/main/docs/sources/logo.png"
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /mnt/appdata/containers/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    ports:
      - "9080:9080"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      - loki

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9080/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 256m
    cpus: 0.25
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://raw.githubusercontent.com/n8n-io/n8n/master/assets/n8n-logo.png"
      net.unraid.docker.webui: "https://n8n.teedge.local"
    networks:
      br0:
        ipv4_address: 192.168.150.139
    environment:
      N8N_HOST: "n8n.teedge.local"
      N8N_PROTOCOL: "https"
      WEBHOOK_URL: "https://n8n.teedge.local/"
      DB_TYPE: "postgresdb"
      DB_POSTGRESDB_HOST: "192.168.150.110"
      DB_POSTGRESDB_PORT: "5433"
      DB_POSTGRESDB_DATABASE: "n8n"
      DB_POSTGRESDB_USER: "authentik"
      DB_POSTGRESDB_PASSWORD: "${PG_PASSWORD}"
      TZ: "America/Chicago"
      # OIDC — n8n has native SSO (Enterprise feature in hosted, free in self-hosted):
      # N8N_AUTH_TYPE: "oidc"
      # N8N_OIDC_CLIENT_ID: <from Authentik>
      # N8N_OIDC_CLIENT_SECRET: <from Authentik>
      # N8N_OIDC_ISSUER: "https://authentik.teedge.local/application/o/n8n/"
      NODE_EXTRA_CA_CERTS: "/usr/local/share/ca-certificates/teedge-local-ca.crt"
    volumes:
      - /mnt/appdata/containers/n8n:/home/node/.n8n
      - /mnt/appdata/certs/teedge-local-ca/ca.crt:/usr/local/share/ca-certificates/teedge-local-ca.crt:ro
    ports:
      - "5678:5678"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 2g
    cpus: 2.0
  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: composeman
      net.unraid.docker.icon: "https://raw.githubusercontent.com/CorentinTh/it-tools/main/public/favicon.ico"
      net.unraid.docker.webui: "https://it-tools.teedge.local"
    networks:
      br0:
        ipv4_address: 192.168.150.140
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: 0.5
